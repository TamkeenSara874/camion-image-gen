services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      # Override API_URL so the frontend container reaches the backend service by name,
      # not by localhost (which would resolve to the frontend container itself).
      API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
